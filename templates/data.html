<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE-Plast - The Growing Problem of Waste and Its Reutilization Process</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #3498db;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            box-shadow: 0 5px 15px rgba(149, 165, 166, 0.3);
        }

        .btn-secondary:hover {
            box-shadow: 0 8px 25px rgba(149, 165, 166, 0.4);
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ecf0f1;
            border-radius: 25px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #3498db;
        }

        .data-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .detection-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #3498db;
            transition: all 0.3s ease;
        }

        .detection-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .detection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .plastic-type {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .detection-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }

        .meta-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #3498db;
        }

        .meta-label {
            font-size: 0.9rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detection-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .detail-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
        }

        .detail-section h4 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar {
            background: #ecf0f1;
            border-radius: 10px;
            height: 8px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .tag {
            background: #3498db;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .timestamp {
            color: #95a5a6;
            font-size: 0.9rem;
            font-style: italic;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }

        .no-data i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #bdc3c7;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .detection-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .detection-meta {
                justify-content: space-between;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-database"></i> RE-Plast Data Collection</h1>
            <p>View all plastic detection results and analysis data</p>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="totalDetections">-</div>
                <div class="stat-label">Total Detections</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgConfidence">-</div>
                <div class="stat-label">Avg Confidence</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgOptimization">-</div>
                <div class="stat-label">Avg Optimization</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueTypes">-</div>
                <div class="stat-label">Unique Types</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by plastic type, description, or applications...">
            </div>
            <a href="/" class="btn btn-secondary">
                <i class="fas fa-camera"></i> Back to Detection
            </a>
            <button class="btn" onclick="refreshData()">
                <i class="fas fa-sync-alt"></i> Refresh Data
            </button>
        </div>

        <div class="data-container">
            <div id="loadingIndicator" class="loading">
                <i class="fas fa-spinner"></i>
                <p>Loading detection data...</p>
            </div>
            
            <div id="dataContent" style="display: none;">
                <!-- Detection data will be loaded here -->
            </div>
            
            <div id="noDataMessage" class="no-data" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h3>No Detection Data Found</h3>
                <p>Start detecting plastic objects to see data here!</p>
                <a href="/" class="btn" style="margin-top: 20px;">
                    <i class="fas fa-camera"></i> Start Detection
                </a>
            </div>
        </div>
    </div>

    <script>
        let allDetections = [];
        let filteredDetections = [];

        async function loadData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                if (data.success) {
                    allDetections = data.detections;
                    filteredDetections = [...allDetections];
                    updateStats();
                    displayDetections();
                } else {
                    console.error('Error loading data:', data.error);
                    showNoData();
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                showNoData();
            }
        }

        function updateStats() {
            const totalDetections = allDetections.length;
            const avgConfidence = totalDetections > 0 ? 
                (allDetections.reduce((sum, d) => sum + d.confidence, 0) / totalDetections * 100).toFixed(1) : 0;
            const avgOptimization = totalDetections > 0 ? 
                (allDetections.reduce((sum, d) => sum + d.optimization_score, 0) / totalDetections).toFixed(1) : 0;
            const uniqueTypes = new Set(allDetections.map(d => d.plastic_type)).size;

            document.getElementById('totalDetections').textContent = totalDetections;
            document.getElementById('avgConfidence').textContent = avgConfidence + '%';
            document.getElementById('avgOptimization').textContent = avgOptimization + '%';
            document.getElementById('uniqueTypes').textContent = uniqueTypes;
        }

        function displayDetections() {
            const contentDiv = document.getElementById('dataContent');
            const loadingDiv = document.getElementById('loadingIndicator');
            const noDataDiv = document.getElementById('noDataMessage');

            loadingDiv.style.display = 'none';

            if (filteredDetections.length === 0) {
                noDataDiv.style.display = 'block';
                contentDiv.style.display = 'none';
                return;
            }

            noDataDiv.style.display = 'none';
            contentDiv.style.display = 'block';

            contentDiv.innerHTML = filteredDetections.map(detection => `
                <div class="detection-card">
                    <div class="detection-header">
                        <div class="plastic-type">${detection.plastic_type}</div>
                        <div class="detection-meta">
                            <div class="meta-item">
                                <div class="meta-value">${(detection.confidence * 100).toFixed(1)}%</div>
                                <div class="meta-label">Confidence</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-value">${detection.optimization_score.toFixed(1)}%</div>
                                <div class="meta-label">Optimization</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-value">${detection.recyclability}%</div>
                                <div class="meta-label">Recyclability</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-value">${detection.durability}%</div>
                                <div class="meta-label">Durability</div>
                            </div>
                        </div>
                    </div>

                    <div class="detection-details">
                        <div class="detail-section">
                            <h4><i class="fas fa-info-circle"></i> Description</h4>
                            <p>${detection.description}</p>
                            
                            <h4><i class="fas fa-recycle"></i> Environmental Impact</h4>
                            <p>${detection.environmental_impact}</p>
                        </div>

                        <div class="detail-section">
                            <h4><i class="fas fa-tools"></i> Applications</h4>
                            <div class="tag-list">
                                ${detection.applications.map(app => `<span class="tag">${app}</span>`).join('')}
                            </div>

                            <h4><i class="fas fa-building"></i> Construction Purposes</h4>
                            <div class="tag-list">
                                ${detection.construction_purposes.map(purpose => `<span class="tag">${purpose}</span>`).join('')}
                            </div>
                        </div>

                        <div class="detail-section">
                            <h4><i class="fas fa-hammer"></i> Specific Uses</h4>
                            <div class="tag-list">
                                ${detection.specific_uses.map(use => `<span class="tag">${use}</span>`).join('')}
                            </div>

                            <h4><i class="fas fa-thermometer-half"></i> Properties</h4>
                            <p><strong>Strength:</strong> ${detection.strength_rating}</p>
                            <p><strong>Temperature Range:</strong> ${detection.temperature_range}</p>
                        </div>
                    </div>

                    <div class="timestamp">
                        <i class="fas fa-clock"></i> Detected on ${new Date(detection.timestamp).toLocaleString()}
                    </div>
                </div>
            `).join('');
        }

        function filterDetections() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            filteredDetections = allDetections.filter(detection => 
                detection.plastic_type.toLowerCase().includes(searchTerm) ||
                detection.description.toLowerCase().includes(searchTerm) ||
                detection.applications.some(app => app.toLowerCase().includes(searchTerm)) ||
                detection.construction_purposes.some(purpose => purpose.toLowerCase().includes(searchTerm)) ||
                detection.specific_uses.some(use => use.toLowerCase().includes(searchTerm))
            );
            displayDetections();
        }

        function refreshData() {
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('dataContent').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'none';
            loadData();
        }

        function showNoData() {
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('dataContent').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'block';
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterDetections);

        // Load data on page load
        loadData();
    </script>
</body>
</html>
